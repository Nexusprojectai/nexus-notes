<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b0b1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Nexus Notes</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230b0b1a'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='%230ff'%3E📝%3C/text%3E%3C/svg%3E" />
  <style>
    /* ═══════════════════════════════════════════
       RESET & VARIABLES
       ═══════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0b0b1a;
      --surface: #111128;
      --surface2: #1a1a35;
      --surface3: #222245;
      --border: #2a2a50;
      --text: #d0d0e8;
      --text2: #8888aa;
      --accent: #0ff;
      --accent2: #7b68ee;
      --accent3: #ff6b9d;
      --green: #0f0;
      --orange: #ff8844;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    input, textarea, button { font-family: inherit; outline: none; border: none; }
    a { color: var(--accent); text-decoration: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text2); }

    /* ═══════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════ */
    .app { display: flex; height: 100vh; width: 100vw; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px; min-width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: transform 0.3s ease;
      z-index: 100;
    }
    .sidebar-header {
      padding: 18px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-header h1 {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sidebar-header .menu-btn {
      display: none; background: none; color: var(--text); font-size: 22px; cursor: pointer;
    }
    .folder-list {
      flex: 1; overflow-y: auto; padding: 8px 0;
    }
    .folder-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer; transition: 0.15s;
      color: var(--text2); font-size: 14px; border-radius: 0; position: relative;
    }
    .folder-item:hover { background: var(--surface2); color: var(--text); }
    .folder-item.active {
      background: rgba(0,255,255,0.08); color: var(--accent);
      border-right: 3px solid var(--accent);
    }
    .folder-item .badge {
      margin-left: auto; background: var(--surface3); padding: 1px 8px;
      border-radius: 10px; font-size: 11px; color: var(--text2);
    }
    .folder-item.active .badge { background: rgba(0,255,255,0.15); color: var(--accent); }
    .folder-item .folder-color {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .sidebar-footer {
      padding: 12px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .sidebar-footer button {
      flex: 1; padding: 8px; border-radius: 8px; font-size: 13px;
      cursor: pointer; transition: 0.15s; font-weight: 600;
    }
    .btn-add-folder {
      background: var(--surface2); color: var(--text2);
    }
    .btn-add-folder:hover { background: var(--surface3); color: var(--text); }
    .btn-add-note {
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000;
    }
    .btn-add-note:hover { opacity: 0.9; }

    /* ── MAIN PANEL ── */
    .main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      min-width: 0;
    }
    .main-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      background: var(--bg);
    }
    .main-header .back-btn {
      display: none; background: none; color: var(--text); font-size: 20px; cursor: pointer;
    }
    .main-header h2 {
      font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .main-header .note-count { color: var(--text2); font-size: 13px; font-weight: 400; }
    .search-box {
      margin-left: auto; display: flex; align-items: center;
      background: var(--surface2); border-radius: 8px; padding: 0 12px; gap: 8px;
      border: 1px solid transparent; transition: 0.2s; max-width: 240px;
    }
    .search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 12px rgba(0,255,255,0.15); }
    .search-box svg { opacity: 0.4; flex-shrink: 0; }
    .search-box input {
      background: none; color: var(--text); padding: 8px 0; font-size: 13px; width: 100%;
    }
    .search-box input::placeholder { color: var(--text2); }

    /* ── NOTES GRID ── */
    .notes-grid {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px; align-content: start;
    }
    .notes-grid.empty {
      display: flex; align-items: center; justify-content: center;
    }
    .empty-state {
      text-align: center; color: var(--text2); padding: 40px;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; }

    /* ── NOTE CARD ── */
    .note-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 16px; cursor: pointer; transition: 0.2s;
      border: 1px solid var(--border); position: relative;
      display: flex; flex-direction: column; gap: 6px;
      max-height: 200px; overflow: hidden;
    }
    .note-card:hover {
      border-color: var(--accent); transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,255,255,0.08);
    }
    .note-card.pinned { border-color: rgba(255,107,157,0.3); }
    .note-card.pinned::before {
      content: '📌'; position: absolute; top: 6px; right: 8px; font-size: 12px; opacity: 0.6;
    }
    .note-card .card-title {
      font-size: 15px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      padding-right: 20px;
    }
    .note-card .card-preview {
      font-size: 13px; color: var(--text2);
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden; line-height: 1.5; word-break: break-word;
    }
    .note-card .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: auto; padding-top: 4px;
    }
    .note-card .card-folder {
      font-size: 11px; color: var(--text2);
      background: var(--surface2); padding: 2px 8px; border-radius: 6px;
    }
    .note-card .card-date {
      font-size: 11px; color: var(--text2);
    }

    /* ── EDITOR PANEL ── */
    .editor-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 200; display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .editor-overlay.open { display: flex; }
    .editor-panel {
      background: var(--surface); border-radius: 16px;
      width: 90%; max-width: 680px; max-height: 90vh;
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .editor-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .editor-header .close-btn {
      background: none; color: var(--text2); font-size: 22px; cursor: pointer;
      padding: 4px; line-height: 1; transition: 0.15s;
    }
    .editor-header .close-btn:hover { color: var(--text); }
    .editor-header .editor-actions {
      margin-left: auto; display: flex; gap: 6px;
    }
    .editor-header .editor-actions button {
      padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600;
      transition: 0.15s; background: var(--surface2); color: var(--text2);
    }
    .editor-header .editor-actions button:hover { background: var(--surface3); color: var(--text); }
    .editor-header .editor-actions .btn-pin.active { color: var(--accent3); }
    .editor-header .editor-actions .btn-delete:hover { color: #f44; background: rgba(255,68,68,0.1); }
    .editor-body {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .editor-body input.title-input {
      background: none; color: var(--text); font-size: 22px; font-weight: 700;
      padding: 4px 0; width: 100%; border-bottom: 1px solid transparent;
    }
    .editor-body input.title-input:focus { border-bottom-color: var(--border); }
    .editor-body input.title-input::placeholder { color: var(--text2); }
    .editor-body .meta-row {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .editor-body .meta-row select {
      background: var(--surface2); color: var(--text); padding: 6px 10px;
      border-radius: 8px; font-size: 12px; border: 1px solid var(--border); cursor: pointer;
    }
    .editor-body .meta-row .date-info { font-size: 11px; color: var(--text2); }
    .editor-body textarea.content-input {
      flex: 1; background: var(--surface2); color: var(--text);
      padding: 16px; border-radius: 10px; font-size: 14px; line-height: 1.7;
      resize: none; min-height: 200px; border: 1px solid transparent;
    }
    .editor-body textarea.content-input:focus { border-color: var(--accent); }
    .editor-body textarea.content-input::placeholder { color: var(--text2); }
    .editor-body .preview-area {
      display: none; padding: 16px; background: var(--surface2);
      border-radius: 10px; font-size: 14px; line-height: 1.7; border: 1px solid var(--border);
      min-height: 100px; white-space: pre-wrap; word-break: break-word;
    }
    .editor-body .preview-toggle {
      align-self: flex-start; font-size: 12px; color: var(--text2);
      background: var(--surface2); padding: 4px 12px; border-radius: 6px; cursor: pointer;
    }
    .editor-body .preview-toggle:hover { color: var(--accent); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 300; display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface); border-radius: 14px;
      padding: 24px; width: 90%; max-width: 380px;
      border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-box h3 { margin-bottom: 16px; font-size: 16px; }
    .modal-box input, .modal-box select {
      width: 100%; padding: 10px 14px; background: var(--surface2);
      border-radius: 8px; color: var(--text); font-size: 14px;
      border: 1px solid var(--border); margin-bottom: 12px;
    }
    .modal-box input:focus { border-color: var(--accent); }
    .modal-box .modal-actions {
      display: flex; gap: 8px; justify-content: flex-end;
    }
    .modal-box .modal-actions button {
      padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .modal-box .modal-actions .btn-cancel { background: var(--surface2); color: var(--text2); }
    .modal-box .modal-actions .btn-cancel:hover { background: var(--surface3); }
    .modal-box .modal-actions .btn-confirm {
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #000;
    }
    .modal-box .modal-actions .btn-confirm:hover { opacity: 0.9; }
    .modal-box .modal-actions .btn-danger { background: #f44; color: #fff; }
    .modal-box .modal-actions .btn-danger:hover { opacity: 0.9; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; top: 0; left: 0; bottom: 0;
        transform: translateX(-100%); z-index: 150;
        box-shadow: 4px 0 30px rgba(0,0,0,0.5);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-header .menu-btn { display: block; }
      .sidebar-backdrop {
        position: fixed; inset: 0; background: rgba(0,0,0,0.4);
        z-index: 149; display: none;
      }
      .sidebar-backdrop.open { display: block; }
      .notes-grid { grid-template-columns: 1fr; padding: 12px 14px; }
      .main-header { padding: 12px 14px; }
      .main-header .back-btn { display: block; }
      .search-box { max-width: 160px; }
      .editor-panel { width: 100%; max-width: 100%; height: 100vh; max-height: 100vh; border-radius: 0; }
      .editor-body { padding: 14px; }
      .editor-body input.title-input { font-size: 18px; }
    }
    @media (max-width: 480px) {
      .notes-grid { grid-template-columns: 1fr; padding: 10px; gap: 10px; }
      .main-header { flex-wrap: wrap; }
      .search-box { max-width: 100%; width: 100%; order: 10; }
    }
  </style>
</head>
<body>

<!-- ═══════════ SIDEBAR BACKDROP (mobile) ═══════════ -->
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="app">
  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="menu-btn" id="closeSidebarBtn">✕</button>
      <h1>📝 Nexus Notes</h1>
    </div>
    <div class="folder-list" id="folderList"></div>
    <div class="sidebar-footer">
      <button class="btn-add-folder" id="addFolderBtn">+ Folder</button>
      <button class="btn-add-note" id="addNoteBtn">+ New Note</button>

  </aside>

  <!-- ═══════════ MAIN PANEL ═══════════ -->
  <main class="main">
    <div class="main-header">
      <button class="back-btn" id="menuBtn">☰</button>
      <h2 id="currentFolderTitle">All Notes</h2>
      <span class="note-count" id="noteCount"></span>
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search notes..." />
      </div>
    </div>
    <div class="notes-grid" id="notesGrid"></div>
  </main>
</div>

<!-- ═══════════ EDITOR MODAL ═══════════ -->
<div class="editor-overlay" id="editorOverlay">
  <div class="editor-panel">
    <div class="editor-header">
      <button class="close-btn" id="closeEditorBtn">✕</button>
      <div class="editor-actions">
        <button class="btn-pin" id="pinBtn">📌</button>
        <button class="btn-delete" id="deleteBtn">🗑️</button>
      </div>
    </div>
    <div class="editor-body">
      <input class="title-input" id="titleInput" placeholder="Note title..." />
      <div class="meta-row">
        <select id="folderSelect"></select>
        <span class="date-info" id="dateInfo"></span>
      </div>
      <button class="preview-toggle" id="previewToggle">👁️ Preview Markdown</button>
      <textarea class="content-input" id="contentInput" placeholder="Start writing..."></textarea>
      <div class="preview-area" id="previewArea"></div>
    </div>
  </div>
</div>

<!-- ═══════════ MODAL (add folder / confirm delete) ═══════════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <h3 id="modalTitle">New Folder</h3>
    <input type="text" id="modalInput" placeholder="Folder name..." />
    <select id="modalColor">
      <option value="#0ff">Cyan</option>
      <option value="#7b68ee">Purple</option>
      <option value="#ff6b9d">Pink</option>
      <option value="#0f0">Green</option>
      <option value="#ff8844">Orange</option>
      <option value="#ffdd44">Yellow</option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">Cancel</button>
      <button class="btn-confirm" id="modalConfirm">Create</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   NEXUS NOTES — Full PWA Notes App
   ═══════════════════════════════════════════════════════════════════ */

// ─── INDEXEDDB ───
const DB_NAME = 'nexus-notes-db';
const DB_VER = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('folders')) {
        const fs = db.createObjectStore('folders', { keyPath: 'id' });
        fs.createIndex('order', 'order');
      }
      if (!db.objectStoreNames.contains('notes')) {
        const ns = db.createObjectStore('notes', { keyPath: 'id' });
        ns.createIndex('folderId', 'folderId');
        ns.createIndex('pinned', 'pinned');
        ns.createIndex('updatedAt', 'updatedAt');
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbAll(storeName) {
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.getAll();
    req.onsuccess = () => { resolve(req.result); db.close(); };
    req.onerror = () => { reject(req.error); db.close(); };
  }));
}

function dbGet(storeName, id) {
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.get(id);
    req.onsuccess = () => { resolve(req.result); db.close(); };
    req.onerror = () => { reject(req.error); db.close(); };
  }));
}

function dbPut(storeName, data) {
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.put(data);
    req.onsuccess = () => { resolve(req.result); db.close(); };
    req.onerror = () => { reject(req.error); db.close(); };
  }));
}

function dbDelete(storeName, id) {
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.delete(id);
    req.onsuccess = () => { resolve(); db.close(); };
    req.onerror = () => { reject(req.error); db.close(); };
  }));
}

function dbCount(storeName, indexName, value) {
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const idx = store.index(indexName);
    const req = idx.count(value);
    req.onsuccess = () => { resolve(req.result); db.close(); };
    req.onerror = () => { reject(req.error); db.close(); };
  }));
}

// ─── STATE ───
let folders = [];
let notes = [];
let currentFolderId = null;
let editingNoteId = null;
let searchQuery = '';
let autoSaveTimer = null;

// ─── DOM REFS ───
const $ = id => document.getElementById(id);
const sidebar = $('sidebar');
const sidebarBackdrop = $('sidebarBackdrop');
const folderList = $('folderList');
const notesGrid = $('notesGrid');
const currentFolderTitle = $('currentFolderTitle');
const noteCount = $('noteCount');
const searchInput = $('searchInput');
const editorOverlay = $('editorOverlay');
const titleInput = $('titleInput');
const contentInput = $('contentInput');
const folderSelect = $('folderSelect');
const dateInfo = $('dateInfo');
const pinBtn = $('pinBtn');
const deleteBtn = $('deleteBtn');
const closeEditorBtn = $('closeEditorBtn');
const previewToggle = $('previewToggle');
const previewArea = $('previewArea');
const modalOverlay = $('modalOverlay');
const modalTitle = $('modalTitle');
const modalInput = $('modalInput');
const modalColor = $('modalColor');
const modalConfirm = $('modalConfirm');
const modalCancel = $('modalCancel');
const addFolderBtn = $('addFolderBtn');
const addNoteBtn = $('addNoteBtn');
const menuBtn = $('menuBtn');
const closeSidebarBtn = $('closeSidebarBtn');

// ─── HELPERS ───
function uid() { return Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7); }
function fmtDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  if (diff < 604800000) return Math.floor(diff/86400000) + 'd ago';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ─── DEFAULT DATA ───
const DEFAULT_FOLDERS = [
  { id: 'all', name: 'All Notes', color: '#0ff', order: 0, builtIn: true },
  { id: 'personal', name: 'Personal', color: '#ff6b9d', order: 1 },
  { id: 'work', name: 'Work', color: '#7b68ee', order: 2 },
  { id: 'ideas', name: 'Ideas', color: '#ffdd44', order: 3 },
];

// ─── LOAD ───
async function loadData() {
  folders = await dbAll('folders');
  notes = await dbAll('notes');

  // Seed default folders if empty
  if (folders.length === 0) {
    for (const f of DEFAULT_FOLDERS) {
      if (f.builtIn) continue;
      await dbPut('folders', { ...f, createdAt: Date.now(), updatedAt: Date.now() });
    }
    folders = await dbAll('folders');
  }

  render();
}

// ─── RENDER SIDEBAR ───
function renderSidebar() {
  const allFolder = { id: 'all', name: 'All Notes', color: '#0ff', builtIn: true };
  const allCount = notes.length;

  let html = `
    <div class="folder-item ${currentFolderId === null ? 'active' : ''}" data-id="all">
      <span class="folder-color" style="background:${allFolder.color}"></span>
      📋 All Notes
      <span class="badge">${allCount}</span>
    </div>
  `;

  // Uncategorized
  const uncatCount = notes.filter(n => !n.folderId || !folders.find(f => f.id === n.folderId)).length;
  html += `
    <div class="folder-item ${currentFolderId === 'uncategorized' ? 'active' : ''}" data-id="uncategorized">
      <span class="folder-color" style="background:#888"></span>
      📥 Uncategorized
      <span class="badge">${uncatCount}</span>
    </div>
  `;

  folders.filter(f => !f.builtIn).sort((a,b) => a.order - b.order).forEach(f => {
    const cnt = notes.filter(n => n.folderId === f.id).length;
    html += `
      <div class="folder-item ${currentFolderId === f.id ? 'active' : ''}" data-id="${f.id}">
        <span class="folder-color" style="background:${f.color}"></span>
        📁 ${f.name}
        <span class="badge">${cnt}</span>
      </div>
    `;
  });

  folderList.innerHTML = html;

  // Click handlers
  folderList.querySelectorAll('.folder-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      if (id === 'all') currentFolderId = null;
      else currentFolderId = id;
      render();
      closeSidebar();
    });
  });
}

// ─── RENDER NOTES ───
function renderNotes() {
  let filtered = [...notes];

  // Filter by folder
  if (currentFolderId === 'uncategorized') {
    filtered = filtered.filter(n => !n.folderId || !folders.find(f => f.id === n.folderId));
  } else if (currentFolderId) {
    filtered = filtered.filter(n => n.folderId === currentFolderId);
  }

  // Search
  if (searchQuery.trim()) {
    const q = searchQuery.trim().toLowerCase();
    filtered = filtered.filter(n =>
      n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q)
    );
  }

  // Sort: pinned first, then by updatedAt desc
  filtered.sort((a, b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return (b.updatedAt || 0) - (a.updatedAt || 0);
  });

  // Title
  if (currentFolderId === null) currentFolderTitle.textContent = 'All Notes';
  else if (currentFolderId === 'uncategorized') currentFolderTitle.textContent = 'Uncategorized';
  else {
    const f = folders.find(f => f.id === currentFolderId);
    currentFolderTitle.textContent = f ? f.name : 'Notes';
  }
  noteCount.textContent = filtered.length ? `(${filtered.length})` : '';

  if (filtered.length === 0) {
    notesGrid.className = 'notes-grid empty';
    notesGrid.innerHTML = `
      <div class="empty-state">
        <div class="icon">${searchQuery.trim() ? '🔍' : '📝'}</div>
        <h3>${searchQuery.trim() ? 'No notes found' : 'No notes yet'}</h3>
        <p>${searchQuery.trim() ? 'Try a different search' : 'Click "+ New Note" to create your first note'}</p>
      </div>
    `;
    return;
  }

  notesGrid.className = 'notes-grid';

  let html = '';
  filtered.forEach(n => {
    const folder = n.folderId ? folders.find(f => f.id === n.folderId) : null;
    const preview = (n.content || '').replace(/[#*`\[\]]/g, '').slice(0, 120);
    html += `
      <div class="note-card ${n.pinned ? 'pinned' : ''}" data-id="${n.id}">
        <div class="card-title">${n.title || 'Untitled'}</div>
        <div class="card-preview">${preview || 'Empty note...'}</div>
        <div class="card-footer">
          <span class="card-folder">${folder ? folder.name : '📥 Uncategorized'}</span>
          <span class="card-date">${fmtDate(n.updatedAt || n.createdAt)}</span>
        </div>
      </div>
    `;
  });

  notesGrid.innerHTML = html;

  // Click handlers
  notesGrid.querySelectorAll('.note-card').forEach(el => {
    el.addEventListener('click', () => openEditor(el.dataset.id));
  });
}

// ─── RENDER ───
function render() {
  renderSidebar();
  renderNotes();
}

// ─── SIDEBAR TOGGLE (mobile) ───
function openSidebar() { sidebar.classList.add('open'); sidebarBackdrop.classList.add('open'); }
function closeSidebar() { sidebar.classList.remove('open'); sidebarBackdrop.classList.remove('open'); }
menuBtn.addEventListener('click', openSidebar);
closeSidebarBtn.addEventListener('click', closeSidebar);
sidebarBackdrop.addEventListener('click', closeSidebar);
